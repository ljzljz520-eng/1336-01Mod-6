        <div class="header__container">
            <h1 class="header__title">加入我们</h1>
            <div class="header__icon" aria-label="招聘图标">💼</div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav__container">
            <button class="nav__toggle" aria-label="切换菜单">
                <span class="nav__toggle-bar"></span>
                <span class="nav__toggle-bar"></span>
                <span class="nav__toggle-bar"></span>
            </button>
            <ul class="nav__list">
                <li class="nav__item"><a href="index.html" class="nav__link">首页</a></li>
                <li class="nav__item"><a href="index.html#guide" class="nav__link">智能导览</a></li>
                <li class="nav__item"><a href="index.html#recommend" class="nav__link">个性化推荐</a></li>

                <li class="nav__item"><a href="jobs.html" class="nav__link nav__link--active">加入我们</a></li>
            </ul>
        </div>
    </nav>

    <main class="main main--jobs">
        <div class="main__container main__container--jobs">
            <section class="jobs-hero">
                <h2 class="jobs-hero__title">与我们一起，用科技重塑旅游体验</h2>
                <p class="jobs-hero__subtitle">我们正在寻找充满激情的你，共同打造下一代智慧旅游平台</p>
            </section>

            <section class="filter-section">
                <div class="filter-group">
                    <label class="filter-label">城市</label>
                    <div class="filter-options" data-filter="city">
                        <button class="filter-btn filter-btn--active" data-value="all">全部</button>
                        <button class="filter-btn" data-value="北京">北京</button>
                        <button class="filter-btn" data-value="上海">上海</button>
                        <button class="filter-btn" data-value="深圳">深圳</button>
                        <button class="filter-btn" data-value="杭州">杭州</button>
                        <button class="filter-btn" data-value="成都">成都</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">岗位类型</label>
                    <div class="filter-options" data-filter="type">
                        <button class="filter-btn filter-btn--active" data-value="all">全部</button>
                        <button class="filter-btn" data-value="技术">技术研发</button>
                        <button class="filter-btn" data-value="产品">产品设计</button>
                        <button class="filter-btn" data-value="运营">市场运营</button>
                        <button class="filter-btn" data-value="数据">数据算法</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">经验要求</label>
                    <div class="filter-options" data-filter="experience">
                        <button class="filter-btn filter-btn--active" data-value="all">全部</button>
                        <button class="filter-btn" data-value="应届生">应届生</button>
                        <button class="filter-btn" data-value="1-3年">1-3年</button>
                        <button class="filter-btn" data-value="3-5年">3-5年</button>
                        <button class="filter-btn" data-value="5年以上">5年以上</button>
                    </div>
                </div>
            </section>

            <section class="job-list" id="jobList">
            </section>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state__icon">🔍</div>
                <p class="empty-state__text">暂无符合条件的职位，试试其他筛选条件吧</p>
            </div>
        </div>
    </main>

    <div class="job-detail-modal" id="jobDetailModal">
        <div class="job-detail-modal__mask"></div>
        <div class="job-detail-modal__content">
            <button class="job-detail-modal__close" aria-label="关闭">×</button>
            <div class="job-detail-modal__body" id="jobDetailBody"></div>
        </div>
    </div>

    <div class="apply-modal" id="applyModal">
        <div class="apply-modal__mask"></div>
        <div class="apply-modal__content">
            <button class="apply-modal__close" aria-label="关闭">×</button>
            <h3 class="apply-modal__title">投递简历</h3>
            <p class="apply-modal__job" id="applyJobName"></p>
            <form class="apply-form" id="applyForm">
                <div class="form-group">
                    <label class="form-label" for="applicantName">姓名 <span class="form-required">*</span></label>
                    <input type="text" class="form-input" id="applicantName" name="name" required placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label class="form-label" for="applicantPhone">手机号 <span class="form-required">*</span></label>
                    <input type="tel" class="form-input" id="applicantPhone" name="phone" required placeholder="请输入您的手机号">
                </div>
                <div class="form-group">
                    <label class="form-label" for="applicantEmail">邮箱 <span class="form-required">*</span></label>
                    <input type="email" class="form-input" id="applicantEmail" name="email" required placeholder="请输入您的邮箱">
                </div>
                <div class="form-group">
                    <label class="form-label" for="applicantResume">简历上传 <span class="form-required">*</span></label>
                    <div class="file-upload">
                        <input type="file" class="file-upload__input" id="applicantResume" name="resume" accept=".pdf,.doc,.docx" required>
                        <div class="file-upload__label">
                            <span class="file-upload__icon">📄</span>
                            <span class="file-upload__text">点击上传简历</span>
                        </div>
                        <span class="file-upload__name" id="uploadedFileName"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="applicantMessage">自我介绍</label>
                    <textarea class="form-textarea" id="applicantMessage" name="message" rows="4" placeholder="简单介绍一下自己吧（选填）"></textarea>
                </div>
                <button type="submit" class="btn btn--primary btn--block">提交申请</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer class="footer">
        <p class="footer__text">智慧旅游科普&copy; 2025</p>
    </footer>

        var currentFilters = {

            experience: 'all'

        function renderJobList() {
            var jobList = document.getElementById('jobList');
            var emptyState = document.getElementById('emptyState');
            
            var filteredJobs = jobsData.filter(function(job) {
                if (currentFilters.city !== 'all' && job.city !== currentFilters.city) return false;
                if (currentFilters.type !== 'all' && job.type !== currentFilters.type) return false;
                if (currentFilters.experience !== 'all' && job.experience !== currentFilters.experience) return false;
                return true;
            });

            if (filteredJobs.length === 0) {
                jobList.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }

            emptyState.style.display = 'none';
            jobList.innerHTML = filteredJobs.map(function(job) {
                var isClosed = job.status === 'closed';
                var statusLabel = isClosed ? '已关闭' : '热招';
                var statusClass = isClosed ? 'job-card__status--closed' : 'job-card__status--open';
                
                return '<article class="job-card' + (isClosed ? ' job-card--closed' : '') + '" data-id="' + job.id + '">' +
                    '<div class="job-card__header">' +
                        '<h3 class="job-card__title">' + job.title + '</h3>' +
                        '<span class="job-card__status ' + statusClass + '">' + statusLabel + '</span>' +
                    '</div>' +
                    '<div class="job-card__meta">' +
                        '<span class="job-card__meta-item">📍 ' + job.city + '</span>' +
                        '<span class="job-card__meta-item">💼 ' + job.type + '</span>' +
                        '<span class="job-card__meta-item">⏱️ ' + job.experience + '</span>' +
                    '</div>' +
                    '<div class="job-card__salary">💰 ' + job.salary + '</div>' +
                    '<div class="job-card__footer">' +
                        '<button class="btn btn--text job-card__detail-btn" data-id="' + job.id + '">查看详情 →</button>' +
                        (isClosed 
                            ? '<button class="btn btn--disabled" disabled>职位已关闭</button>'
                            : '<button class="btn btn--primary btn--small job-card__apply-btn" data-id="' + job.id + '">立即投递</button>') +
                    '</div>' +
                '</article>';
            }).join('');

            document.querySelectorAll('.job-card__detail-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var jobId = parseInt(this.getAttribute('data-id'));
                    openJobDetail(jobId);
                });
            });

            document.querySelectorAll('.job-card__apply-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var jobId = parseInt(this.getAttribute('data-id'));
                    openApplyModal(jobId);
                });
            });

            document.querySelectorAll('.job-card').forEach(function(card) {
                if (!card.classList.contains('job-card--closed')) {
                    card.addEventListener('click', function() {
                        var jobId = parseInt(this.getAttribute('data-id'));
                        openJobDetail(jobId);
                    });
                }
            });
        }

        function openJobDetail(jobId) {
            var job = jobsData.find(function(j) { return j.id === jobId; });
            if (!job) return;

            currentJobId = jobId;
            var isClosed = job.status === 'closed';

            var body = document.getElementById('jobDetailBody');
            body.innerHTML = 
                '<div class="job-detail__header">' +
                    '<div>' +
                        '<h2 class="job-detail__title">' + job.title + '</h2>' +
                        '<div class="job-detail__meta">' +
                            '<span>📍 ' + job.city + '</span>' +
                            '<span>💼 ' + job.type + '</span>' +
                            '<span>⏱️ ' + job.experience + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="job-detail__salary">💰 ' + job.salary + '</div>' +
                '</div>' +
                '<span class="job-card__status ' + (isClosed ? 'job-card__status--closed' : 'job-card__status--open') + '">' + (isClosed ? '已关闭' : '热招中') + '</span>' +
                
                '<div class="job-detail__section">' +
                    '<h4 class="job-detail__section-title">岗位职责</h4>' +
                    '<ul class="job-detail__list">' +
                        job.responsibilities.map(function(r) { return '<li>' + r + '</li>'; }).join('') +
                    '</ul>' +
                '</div>' +
                
                '<div class="job-detail__section">' +
                    '<h4 class="job-detail__section-title">任职要求</h4>' +
                    '<ul class="job-detail__list">' +
                        job.requirements.map(function(r) { return '<li>' + r + '</li>'; }).join('') +
                    '</ul>' +
                '</div>' +
                
                '<div class="job-detail__section">' +
                    '<h4 class="job-detail__section-title">团队介绍</h4>' +
                    '<p class="job-detail__team-desc">' + job.team + '</p>' +
                '</div>' +
                
                '<div class="job-detail__actions">' +
                    (isClosed 
                        ? '<button class="btn btn--disabled btn--block" disabled>该职位已关闭，无法投递</button>'
                        : '<button class="btn btn--primary btn--block" id="detailApplyBtn">立即投递简历</button>') +
                '</div>';

            var modal = document.getElementById('jobDetailModal');
            modal.classList.add('job-detail-modal--visible');
            document.body.style.overflow = 'hidden';

            if (!isClosed) {
                document.getElementById('detailApplyBtn').addEventListener('click', function() {
                    closeJobDetail();
                    setTimeout(function() {
                        openApplyModal(jobId);
                    }, 200);
                });
            }
        }

        function closeJobDetail() {
            var modal = document.getElementById('jobDetailModal');
            modal.classList.remove('job-detail-modal--visible');
            document.body.style.overflow = '';
        }

        function openApplyModal(jobId) {
            var job = jobsData.find(function(j) { return j.id === jobId; });
            if (!job || job.status === 'closed') return;

            currentJobId = jobId;
            document.getElementById('applyJobName').textContent = '职位：' + job.title + '（' + job.city + '）';
            
            document.getElementById('applyForm').reset();
            document.getElementById('uploadedFileName').textContent = '';

            var modal = document.getElementById('applyModal');
            modal.classList.add('apply-modal--visible');
            document.body.style.overflow = 'hidden';
        }

        function closeApplyModal() {
            var modal = document.getElementById('applyModal');
            modal.classList.remove('apply-modal--visible');
            document.body.style.overflow = '';
        }

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast toast--' + (type || 'success');
            toast.classList.add('toast--visible');
            
            setTimeout(function() {
                toast.classList.remove('toast--visible');
            }, 3000);
        }

        document.querySelectorAll('.filter-options').forEach(function(group) {
            var filterType = group.getAttribute('data-filter');
            group.addEventListener('click', function(e) {
                if (!e.target.classList.contains('filter-btn')) return;
                
                var value = e.target.getAttribute('data-value');
                currentFilters[filterType] = value;
                
                group.querySelectorAll('.filter-btn').forEach(function(btn) {
                    btn.classList.remove('filter-btn--active');
                });
                e.target.classList.add('filter-btn--active');
                
                renderJobList();
            });
        });

        document.querySelector('.job-detail-modal__close').addEventListener('click', closeJobDetail);
        document.querySelector('.job-detail-modal__mask').addEventListener('click', closeJobDetail);

        document.querySelector('.apply-modal__close').addEventListener('click', closeApplyModal);
        document.querySelector('.apply-modal__mask').addEventListener('click', closeApplyModal);

        document.getElementById('applicantResume').addEventListener('change', function(e) {
            var fileName = e.target.files.length > 0 ? e.target.files[0].name : '';
            document.getElementById('uploadedFileName').textContent = fileName;
        });

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var job = jobsData.find(function(j) { return j.id === currentJobId; });
            if (!job || job.status === 'closed') {
                showToast('该职位已关闭，无法投递', 'error');
                return;
            }

            var name = document.getElementById('applicantName').value.trim();
            var phone = document.getElementById('applicantPhone').value.trim();
            var email = document.getElementById('applicantEmail').value.trim();
            var resume = document.getElementById('applicantResume').files.length > 0;

            if (!name || !phone || !email || !resume) {
                showToast('请填写完整信息并上传简历', 'error');
                return;
            }

            var phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }

            showToast('简历投递成功！我们会尽快与您联系', 'success');
            closeApplyModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeJobDetail();
                closeApplyModal();
            }
        });

        renderJobList();
    </script>
</body>
</html>
